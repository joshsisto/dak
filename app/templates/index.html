<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pi Wallboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <div class="background-gradient"></div>
    <main class="layout">
      <section class="panel panel-hero">
        <div class="hero-main">
          <div class="hero-clock">
            <div class="clock" id="clock">--:--:--</div>
            <div class="date" id="date">Loading date…</div>
          </div>

          <div class="hero-now">
            <div class="hero-now-icon" id="weather-icon">•</div>
            <div class="hero-now-text">
              <div class="hero-temp" id="weather-temp">--</div>
              <div class="hero-desc" id="weather-desc">Loading weather…</div>
              <div class="weather-meta" id="weather-meta"></div>
              <div class="weather-extra" id="weather-extra"></div>
            </div>
          </div>

          <div class="hero-mini-calendar">
            <div class="hero-mini-calendar-head">
              <div class="section-title">Calendar</div>
              <div class="mini-month-label" id="mini-month-label">Month</div>
            </div>
            <div class="mini-weekdays" id="mini-weekdays"></div>
            <div class="mini-days-grid" id="mini-days-grid"></div>
          </div>

          <div class="hero-moon">
            <div class="hero-moon-head">
              <div class="section-title">Advanced Lunar</div>
              <div class="moon-cycle-state" id="moon-cycle-state">Loading cycle…</div>
            </div>
            <div class="moon-content">
              <div class="moon-photo-wrap">
                <img id="moon-photo" alt="Moon phase">
                <div class="moon-fallback" id="moon-fallback">🌙</div>
              </div>
              <div class="moon-stats" id="moon-stats"></div>
            </div>
            <div class="moon-progress">
              <div class="moon-progress-track">
                <div class="moon-progress-fill" id="moon-progress-fill"></div>
              </div>
              <div class="moon-progress-labels">
                <span>🌑</span>
                <span>🌓</span>
                <span>🌕</span>
                <span>🌗</span>
                <span>🌑</span>
              </div>
            </div>
            <div class="moon-caption" id="moon-caption">Loading moon data…</div>
          </div>

          <div class="hero-forecast-wrap">
            <div class="section-title">Forecast</div>
            <div class="weather-forecast" id="weather-forecast"></div>
          </div>
        </div>
      </section>

      <section class="panel panel-events">
        <div class="section-title">Upcoming Events (Combined)</div>
        <ul class="event-list" id="event-list">
          <li class="placeholder">Loading calendar…</li>
        </ul>
      </section>

      <section class="panel panel-photos">
        <div class="section-title">Shared Album</div>
        <div class="photo-frame">
          <img id="photo" alt="Shared album photo">
          <div class="photo-caption" id="photo-caption"></div>
        </div>
      </section>
    </main>

    <script>
      const REFRESH_MS = {{ settings.data_refresh_seconds }} * 1000;
      const SLIDESHOW_MS = {{ settings.slideshow_interval_seconds }} * 1000;
      const DISPLAY_TIMEZONE = "{{ settings.display_timezone }}";

      let photos = [];
      let photoIndex = 0;
      let serverEpochBaseMs = Date.now();
      let perfBaseMs = performance.now();
      let activeTimezone = DISPLAY_TIMEZONE;
      let currentCombinedEvents = [];
      let lastDateKey = "";
      let isRefreshing = false;
      let refreshQueued = false;
      const BADGE_PALETTE = [
        ["#58d7ff", "#07243a"],
        ["#ffb347", "#2a1500"],
        ["#8be38f", "#08270c"],
        ["#ff88ba", "#300018"],
        ["#c7a4ff", "#240a45"],
        ["#ffe26f", "#2a2100"],
        ["#ff9a7b", "#2f0e00"],
        ["#9de4d6", "#072620"]
      ];

      function escapeHtml(value) {
        if (value == null) {
          return "";
        }
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatNumber(value, decimals = 0) {
        if (value == null || Number.isNaN(Number(value))) {
          return "";
        }
        return Number(value).toLocaleString(undefined, {
          minimumFractionDigits: decimals,
          maximumFractionDigits: decimals
        });
      }

      function setServerClock(epochMs) {
        if (typeof epochMs !== "number" || Number.isNaN(epochMs)) {
          return;
        }
        serverEpochBaseMs = epochMs;
        perfBaseMs = performance.now();
      }

      function nowFromServer() {
        const elapsed = performance.now() - perfBaseMs;
        return new Date(serverEpochBaseMs + elapsed);
      }

      function localDateKey(dateValue = nowFromServer()) {
        const parts = new Intl.DateTimeFormat("en-CA", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          timeZone: activeTimezone
        }).formatToParts(dateValue);
        const map = {};
        for (const part of parts) {
          if (part.type !== "literal") {
            map[part.type] = part.value;
          }
        }
        return `${map.year || "0000"}-${map.month || "00"}-${map.day || "00"}`;
      }

      function badgeColorsForCalendar(calendarName) {
        const text = String(calendarName || "").trim();
        if (!text) {
          return BADGE_PALETTE[0];
        }
        let hash = 0;
        for (let index = 0; index < text.length; index += 1) {
          hash = (hash * 31 + text.charCodeAt(index)) % 2147483647;
        }
        return BADGE_PALETTE[Math.abs(hash) % BADGE_PALETTE.length];
      }

      function eventMarkup(event) {
        const location = event.location ? `<div class="event-location">${escapeHtml(event.location)}</div>` : "";
        let badge = "";
        if (event.calendar_name) {
          const [bg, fg] = badgeColorsForCalendar(event.calendar_name);
          badge = `<span class="event-calendar-badge" style="background:${bg};color:${fg}">${escapeHtml(event.calendar_name)}</span>`;
        }
        return `
          <div class="event-when">
            <div class="event-day">${escapeHtml(event.day_label)}</div>
            <div class="event-time">${escapeHtml(event.time_label)}</div>
          </div>
          <div class="event-main">
            <div class="event-title-wrap">
              <div class="event-title">${escapeHtml(event.title)}</div>
              ${badge}
            </div>
            ${location}
          </div>
        `;
      }

      function formatClock() {
        const now = nowFromServer();
        const clock = new Intl.DateTimeFormat("en-US", {
          hour: "numeric",
          minute: "2-digit",
          second: "2-digit",
          hour12: true,
          timeZone: activeTimezone
        }).format(now);
        const date = new Intl.DateTimeFormat("en-US", {
          weekday: "long",
          month: "long",
          day: "numeric",
          timeZone: activeTimezone
        }).format(now);
        document.getElementById("clock").textContent = clock;
        document.getElementById("date").textContent = date;

        const dateKey = localDateKey(now);
        updateMiniCalendarToday(dateKey);
        if (lastDateKey && dateKey !== lastDateKey) {
          refreshDashboard();
        }
        lastDateKey = dateKey;
      }

      function renderTimeStatus(timePayload) {
        if (timePayload && timePayload.server_epoch_ms) {
          setServerClock(timePayload.server_epoch_ms);
        }
        if (timePayload && timePayload.timezone) {
          activeTimezone = timePayload.timezone;
        } else {
          activeTimezone = DISPLAY_TIMEZONE;
        }
      }

      function renderEvents(events) {
        const list = document.getElementById("event-list");
        list.innerHTML = "";
        if (!events || events.length === 0) {
          list.innerHTML = '<li class="placeholder">No upcoming events in range.</li>';
          return;
        }
        for (const event of events) {
          const row = document.createElement("li");
          row.className = "event-item";
          row.innerHTML = eventMarkup(event);
          list.appendChild(row);
        }
      }

      function renderMiniCalendar(monthView) {
        const monthLabel = document.getElementById("mini-month-label");
        const weekdays = document.getElementById("mini-weekdays");
        const daysGrid = document.getElementById("mini-days-grid");

        const weekdayLabels = monthView?.weekday_labels || ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        weekdays.innerHTML = "";
        for (const day of weekdayLabels) {
          const cell = document.createElement("div");
          cell.className = "mini-weekday";
          cell.textContent = day.slice(0, 1);
          weekdays.appendChild(cell);
        }

        if (!monthView || !Array.isArray(monthView.cells)) {
          monthLabel.textContent = "Calendar";
          daysGrid.innerHTML = "";
          return;
        }

        monthLabel.textContent = monthView.month_label || "Current Month";
        daysGrid.innerHTML = "";
        for (const dayCell of monthView.cells) {
          const cell = document.createElement("div");
          cell.className = "mini-day";
          if (dayCell.date) {
            cell.dataset.date = dayCell.date;
          }
          if (!dayCell.in_month) {
            cell.classList.add("is-outside");
          }
          if (dayCell.is_today) {
            cell.classList.add("is-today");
          }
          cell.textContent = dayCell.day;
          daysGrid.appendChild(cell);
        }
        updateMiniCalendarToday(localDateKey());
      }

      function updateMiniCalendarToday(dateKey) {
        const cells = document.querySelectorAll(".mini-day");
        for (const cell of cells) {
          if (cell.dataset.date === dateKey) {
            cell.classList.add("is-today");
          } else {
            cell.classList.remove("is-today");
          }
        }
      }

      function pruneExpiredEvents() {
        if (!currentCombinedEvents.length) {
          return;
        }
        const nowMs = nowFromServer().getTime();
        const filtered = currentCombinedEvents.filter((event) => {
          const endMs = Date.parse(event.end_iso || "");
          if (Number.isNaN(endMs)) {
            return true;
          }
          return endMs >= nowMs;
        });
        if (filtered.length !== currentCombinedEvents.length) {
          currentCombinedEvents = filtered;
          renderEvents(currentCombinedEvents);
        }
      }

      function renderWeather(weather) {
        const current = weather?.current || {};
        const details = weather?.details || {};
        const unit = weather?.temperature_unit || "";
        const windUnit = weather?.wind_speed_unit || "";
        document.getElementById("weather-icon").textContent = current.icon || "•";
        document.getElementById("weather-temp").textContent =
          current.temperature != null ? `${Math.round(current.temperature)}${unit}` : "--";
        document.getElementById("weather-desc").textContent = current.description || "Unavailable";
        document.getElementById("weather-meta").textContent =
          current.feels_like != null
            ? `Feels like ${Math.round(current.feels_like)}${unit} • Wind ${Math.round(current.wind_speed || 0)} ${windUnit}`
            : "";

        const detailsRows = [];
        if (details.humidity != null) {
          detailsRows.push({ label: "Humidity", value: `${Math.round(details.humidity)}%` });
        }
        if (details.air_quality_index != null) {
          detailsRows.push({
            label: "AQI",
            value: `${details.air_quality_index} (${details.air_quality_label || "Unknown"})`
          });
        }
        if (details.sunrise) {
          detailsRows.push({ label: "Sunrise", value: details.sunrise });
        }
        if (details.sunset) {
          detailsRows.push({ label: "Sunset", value: details.sunset });
        }

        const detailsEl = document.getElementById("weather-extra");
        detailsEl.innerHTML = "";
        for (const item of detailsRows) {
          const row = document.createElement("div");
          row.className = "weather-detail-row";
          row.innerHTML = `
            <span class="weather-detail-label">${escapeHtml(item.label)}</span>
            <span class="weather-detail-value">${escapeHtml(item.value)}</span>
          `;
          detailsEl.appendChild(row);
        }

        const moonPhoto = document.getElementById("moon-photo");
        const moonFallback = document.getElementById("moon-fallback");
        const moonCaption = document.getElementById("moon-caption");
        const moonCycleState = document.getElementById("moon-cycle-state");
        const moonProgressFill = document.getElementById("moon-progress-fill");
        const moonStats = document.getElementById("moon-stats");
        const moonIcon = details.moon_icon || "🌙";
        const moonPhase = details.moon_phase || "Moon phase";
        const moonIllumination =
          details.moon_illumination != null ? `${details.moon_illumination}% illuminated` : "";
        const moonAge =
          details.moon_age_days != null ? `Day ${formatNumber(details.moon_age_days, 1)}` : "";
        const moonDirection = details.moon_cycle_direction || "";
        const moonNextPhase = details.moon_next_phase || "";
        const moonDaysUntilNext =
          details.moon_days_until_next_phase != null
            ? `${formatNumber(details.moon_days_until_next_phase, 1)}d`
            : "";

        moonCycleState.textContent = [moonDirection, moonAge].filter(Boolean).join(" • ") || "Lunar cycle";
        moonCaption.textContent = [
          moonPhase,
          moonIllumination,
          moonNextPhase && moonDaysUntilNext
            ? `Next ${moonNextPhase} in ${moonDaysUntilNext}`
            : ""
        ].filter(Boolean).join(" • ");

        const cycleProgress = Number(details.moon_cycle_progress);
        moonProgressFill.style.width = Number.isFinite(cycleProgress)
          ? `${Math.max(0, Math.min(100, cycleProgress))}%`
          : "0%";

        const moonStatRows = [];
        if (details.moon_illumination != null) {
          moonStatRows.push({ label: "Illumination", value: `${formatNumber(details.moon_illumination)}%` });
        }
        if (details.moon_age_days != null) {
          moonStatRows.push({ label: "Lunar Age", value: `${formatNumber(details.moon_age_days, 1)} days` });
        }
        if (details.moon_distance_km != null) {
          moonStatRows.push({ label: "Distance", value: `${formatNumber(details.moon_distance_km)} km` });
        }
        if (details.moon_angular_diameter_arcsec != null) {
          moonStatRows.push({
            label: "Angular Size",
            value: `${formatNumber(details.moon_angular_diameter_arcsec, 1)} arcsec`
          });
        }
        if (details.moon_phase_angle_deg != null) {
          moonStatRows.push({ label: "Phase Angle", value: `${formatNumber(details.moon_phase_angle_deg, 1)}°` });
        }
        if (moonNextPhase && moonDaysUntilNext) {
          moonStatRows.push({ label: "Next Phase", value: `${moonNextPhase} (${moonDaysUntilNext})` });
        }

        moonStats.innerHTML = "";
        for (const item of moonStatRows.slice(0, 6)) {
          const row = document.createElement("div");
          row.className = "moon-stat";
          row.innerHTML = `
            <span class="moon-stat-label">${escapeHtml(item.label)}</span>
            <span class="moon-stat-value">${escapeHtml(item.value)}</span>
          `;
          moonStats.appendChild(row);
        }

        if (details.moon_image_url) {
          const imageKey = details.moon_image_key || "";
          const imageUrl = imageKey
            ? `${details.moon_image_url}${details.moon_image_url.includes("?") ? "&" : "?"}v=${encodeURIComponent(imageKey)}`
            : details.moon_image_url;
          moonPhoto.src = imageUrl;
          moonPhoto.style.display = "block";
          moonFallback.style.display = "none";
        } else {
          moonPhoto.removeAttribute("src");
          moonPhoto.style.display = "none";
          moonFallback.textContent = moonIcon;
          moonFallback.style.display = "flex";
        }

        const forecast = document.getElementById("weather-forecast");
        forecast.innerHTML = "";
        const forecastDays = (weather?.daily || []).slice(0, 4);
        for (const day of forecastDays) {
          const high = day.high != null ? Math.round(day.high) : "--";
          const low = day.low != null ? Math.round(day.low) : "--";
          const card = document.createElement("div");
          card.className = "forecast-card";
          card.innerHTML = `
            <div class="forecast-card-day">${day.day_label}</div>
            <div class="forecast-card-icon">${day.icon}</div>
            <div class="forecast-card-temp">${high}°<span>/${low}°</span></div>
          `;
          forecast.appendChild(card);
        }
      }

      function renderCurrentPhoto() {
        const image = document.getElementById("photo");
        const caption = document.getElementById("photo-caption");
        if (!photos.length) {
          image.removeAttribute("src");
          caption.textContent = "No photos available.";
          return;
        }
        if (photoIndex >= photos.length) {
          photoIndex = 0;
        }
        const current = photos[photoIndex];
        image.src = current.url;
        caption.textContent = current.caption || "";
      }

      function advancePhoto() {
        if (!photos.length) {
          return;
        }
        photoIndex = (photoIndex + 1) % photos.length;
        renderCurrentPhoto();
      }

      async function refreshDashboard() {
        if (isRefreshing) {
          refreshQueued = true;
          return;
        }
        isRefreshing = true;
        try {
          const response = await fetch("/api/dashboard");
          const payload = await response.json();
          const calendars = payload.calendars || {};
          renderTimeStatus(payload.time || {});
          currentCombinedEvents = calendars.combined || payload.calendar || [];
          renderMiniCalendar(calendars.month_view || {});
          renderEvents(currentCombinedEvents);
          renderWeather(payload.weather || {});
          const nextPhotos = payload.photos || [];
          const hasPhotoListChanged =
            nextPhotos.length !== photos.length ||
            nextPhotos.some((photo, index) => photo.url !== photos[index]?.url);
          photos = nextPhotos;
          if (hasPhotoListChanged) {
            photoIndex = 0;
          } else if (photoIndex >= photos.length) {
            photoIndex = 0;
          }
          renderCurrentPhoto();
        } catch (error) {
          console.error("Dashboard refresh failed", error);
        } finally {
          isRefreshing = false;
          if (refreshQueued) {
            refreshQueued = false;
            refreshDashboard();
          }
        }
      }

      formatClock();
      setInterval(formatClock, 1000);
      refreshDashboard();
      setInterval(refreshDashboard, REFRESH_MS);
      setInterval(pruneExpiredEvents, 15000);
      setInterval(advancePhoto, SLIDESHOW_MS);
    </script>
  </body>
</html>
